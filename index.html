<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加古川市の文化遺産・動画ギャラリー</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e0e0e;
      color: #f0f0f0;
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid #222;
      background: #111;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    header .credit {
      margin-top: 6px;
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.03em;
    }

    /* ======= 目次ナビゲーション ======= */
    #toc-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
    }

    #toc-nav {
      padding: 10px 40px 10px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      white-space: nowrap;
      cursor: grab;
      user-select: none;
    }

    #toc-nav.dragging {
      cursor: grabbing;
    }

    #toc-nav::-webkit-scrollbar {
      display: none;
    }

    #toc-nav .toc-label {
      display: inline-block;
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      vertical-align: middle;
      margin-right: 10px;
    }

    /* 右端フェードアウト＋スクロールヒント */
    #toc-scroll-hint {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 48px;
      background: linear-gradient(to right, transparent, #161616);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 6px;
      font-size: 0.75rem;
      color: #555;
    }

    .toc-item {
      display: inline-block;
      margin-right: 8px;
      padding: 6px 14px;
      background: #222;
      border: 1px solid #333;
      border-radius: 20px;
      font-size: 0.78rem;
      color: #ccc;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      vertical-align: middle;
      white-space: nowrap;
      user-select: none;
    }

    .toc-item:hover {
      background: #2e2e2e;
      color: #fff;
      border-color: #555;
    }

    .toc-item:active {
      background: #c8a96e;
      color: #000;
      border-color: #c8a96e;
    }

    @media (max-width: 600px) {
      #toc-nav {
        padding: 8px 12px;
      }
      .toc-item {
        font-size: 0.74rem;
        padding: 5px 12px;
      }
    }

    /* ======= Player Area ======= */
    #player-section {
      display: none;
      background: #000;
      position: relative;
    }

    #player-section.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #main-video {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      background: #000;
    }

    #now-playing-label {
      width: 100%;
      padding: 10px 20px;
      background: rgba(0,0,0,0.85);
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    #now-playing-label span {
      color: #fff;
      font-weight: 600;
    }

    /* ======= Thumbnail Grid ======= */
    #gallery {
      padding: 28px 28px 40px;
    }

    #gallery h2 {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .thumb-card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
    }

    .thumb-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      border-color: #444;
    }

    .thumb-card.playing {
      border-color: #e53935;
      box-shadow: 0 0 0 2px #e53935aa;
    }

    .thumb-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
    }

    .thumb-canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Play overlay icon */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      transition: background 0.2s;
    }

    .thumb-card:hover .play-overlay {
      background: rgba(0,0,0,0.15);
    }

    .thumb-card.playing .play-overlay {
      background: rgba(229,57,53,0.18);
    }

    .play-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }

    .thumb-card:hover .play-icon {
      background: rgba(229,57,53,0.85);
      transform: scale(1.08);
    }

    .thumb-card.playing .play-icon {
      background: rgba(229,57,53,0.9);
    }

    .play-icon svg {
      margin-left: 4px;
    }

    /* LIVE badge for currently playing */
    .live-badge {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: #e53935;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .thumb-card.playing .live-badge {
      display: block;
    }

    /* ===== 文化財指定バッジ ===== */
    .desig-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 3px;
      z-index: 2;
      pointer-events: none;
    }

    .badge-kokuhо   { background: #c8a429; color: #1a1a1a; } /* 国宝：金 */
    .badge-jubun    { background: #c0390b; color: #fff;    } /* 重要文化財：赤橙 */
    .badge-shiseki  { background: #2d7a4f; color: #fff;    } /* 史跡：緑 */
    .badge-shitei   { background: #1a5a9a; color: #fff;    } /* 市指定：青 */
    .badge-touroku  { background: #555;    color: #ddd;    } /* 市登録：グレー */

    /* ===== グループヘッダー ===== */
    .group-header {
      grid-column: 1 / -1;
      margin: 28px 0 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2e2e2e;
    }

    .group-header:first-child {
      margin-top: 0;
    }

    .group-header .group-level {
      font-size: 0.68rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .group-header .group-title {
      font-size: 1rem;
      font-weight: 600;
      color: #ddd;
      letter-spacing: 0.04em;
    }

    .group-header .group-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 7px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .thumb-info {
      padding: 12px 14px;
    }

    .thumb-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.4;
      word-break: break-all;
    }

    .thumb-sub {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }

    .thumb-desc {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 8px;
      line-height: 1.6;
      border-top: 1px solid #2a2a2a;
      padding-top: 8px;
    }

    .thumb-ref {
      display: block;
      margin-top: 8px;
      font-size: 0.72rem;
      color: #555;
    }

    .thumb-ref a {
      color: #6a9fd8;
      text-decoration: none;
    }

    .thumb-ref a:hover {
      text-decoration: underline;
    }

    /* Info-only card (no video) */
    .thumb-card.info-only {
      cursor: default;
    }

    .thumb-card.info-only:hover {
      transform: none;
      box-shadow: none;
      border-color: #333;
    }

    .info-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #161616;
      gap: 8px;
    }

    .info-placeholder span {
      font-size: 2.4rem;
    }

    .info-placeholder p {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 0.06em;
    }

    .info-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #3a3a3a;
      color: #aaa;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
    }

    /* Loading spinner on canvas while seeking */
    .thumb-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ======= Responsive ======= */
    @media (max-width: 600px) {
      header {
        padding: 16px 16px 12px;
      }
      header h1 {
        font-size: 1.05rem;
      }
      header .credit {
        font-size: 0.7rem;
      }
      #gallery {
        padding: 16px 12px 28px;
      }
      #map-section {
        padding: 16px 12px 28px;
      }
      .thumb-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .thumb-desc {
        font-size: 0.78rem;
      }
      #map {
        height: 300px;
      }
      #now-playing-label {
        font-size: 0.78rem;
        padding: 8px 12px;
      }
    }

    @media (min-width: 601px) and (max-width: 900px) {
      header {
        padding: 18px 20px 14px;
      }
      #gallery {
        padding: 20px 16px 32px;
      }
      #map-section {
        padding: 20px 16px 32px;
      }
      .thumb-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      #map {
        height: 360px;
      }
    }

    /* ======= Map Section ======= */
    #map-section {
      padding: 28px 28px 40px;
      border-top: 1px solid #1e1e1e;
    }

    #map-section h2 {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    #map {
      width: 100%;
      height: 420px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>

<header>
  <h1>🎬 加古川市の文化遺産・動画ギャラリー</h1>
  <p class="credit">制作：兵庫県立東播工業高等学校 建築科 ファブラボスタジオ（FabLab Studio）</p>
</header>

<!-- 目次ナビゲーション -->
<div id="toc-wrap">
  <nav id="toc-nav">
    <span class="toc-label">目次</span>
    <!-- JavaScriptで動的に生成 -->
  </nav>
  <div id="toc-scroll-hint">›</div>
</div>

<!-- メインプレイヤー -->
<section id="player-section">
  <video id="main-video" autoplay loop playsinline></video>
  <div id="now-playing-label">再生中：<span id="now-playing-title">—</span></div>
</section>

<!-- サムネイルギャラリー -->
<div id="gallery">
  <h2>動画一覧</h2>
  <div class="thumb-grid" id="thumb-grid"></div>
</div>

<!-- 地図 -->
<div id="map-section">
  <h2>📍 所在地マップ（加古川市）</h2>
  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // ===== 地図の初期化 =====
  const map = L.map('map').setView([34.775, 134.860], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  // マーカー情報（住所から確認した座標をハードコード）
  const spots = [
    {
      lat: 34.76477, lon: 134.86173,
      label: '🌉 平木橋／市指定文化財',
      sub: '加古川市野口町水足247',
      note: '大正4年（1915）建造の水路橋。市指定文化財。'
    },
    {
      lat: 34.79148, lon: 134.85160,
      label: '🪨 稚児窟石棺蓋／市指定文化財',
      sub: '加古川市平荘町69',
      note: '6世紀末〜7世紀初頭の家形石棺蓋。市指定文化財。'
    },
    {
      lat: 34.78159, lon: 134.88669,
      label: '🏛 尼塚古墳／国指定史跡',
      sub: '加古川市西条古墳群',
      note: '5世紀中葉頃築造の帆立貝式古墳。国指定史跡・西条古墳群のひとつ。'
    },
    {
      lat: 34.75228, lon: 134.83261,
      label: '⛩ 鶴林寺本堂／国宝',
      sub: '加古川市加古川町北在家424',
      note: '14世紀建立の折衷様式建築。国宝。'
    },
    {
      lat: 34.75213, lon: 134.83283,
      label: '⛩ 鶴林寺太子堂／国宝',
      sub: '加古川市加古川町北在家424',
      note: '兵庫県最古の建築。天台宗の法華堂。国宝。'
    },
    {
      lat: 34.75231, lon: 134.83292,
      label: '🔔 鶴林寺鐘楼／国指定重要文化財',
      sub: '加古川市加古川町北在家424',
      note: '袴腰造りの大型鐘楼。高麗時代の朝鮮鐘を所蔵。重要文化財。'
    },
    {
      lat: 34.77470, lon: 134.82831,
      label: '📜 七騎塚の碑／市登録文化財',
      sub: '加古川市加古川町本町（大師堂境内）',
      note: '南北朝時代（1341年）に主君のため討死した7騎を顕彰。文化10年（1813年）建立。市登録文化財。'
    }
  ];

  const bounds = spots.map(s => [s.lat, s.lon]);

  spots.forEach((spot, i) => {
    const marker = L.marker([spot.lat, spot.lon]).addTo(map);
    marker.bindPopup(`
      <div style="font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;min-width:190px;">
        <strong style="font-size:1rem;">${spot.label}</strong><br>
        <span style="font-size:0.8rem;color:#666;">${spot.sub}</span><br>
        <span style="font-size:0.78rem;margin-top:4px;display:block;">${spot.note}</span>
      </div>
    `);
    if (i === 0) marker.openPopup();
  });

  map.fitBounds(bounds, { padding: [60, 60] });

  // ===== 動画ファイルリスト（文化財区分順）=====
  const videos = [
    // ── 国宝　建造物 ──────────────────────────
    {
      file: '鶴林寺本堂.mp4', thumb: 'thumb_鶴林寺本堂.jpg',
      name: '鶴林寺本堂',
      group: '国宝　建造物', groupLevel: '国指定文化財',
      badge: '国宝', badgeClass: 'badge-kokuhо',
      dotColor: '#c8a429',
      sub: '国指定文化財｜建造物',
      desc: '薬師如来・日光菩薩・月光菩薩を本尊とし、説法や儀式の場として「大講堂」とも称される。和様に唐様・天竺様を融合した折衷様式（14世紀）の最高峰とされる建築で、内部は内陣と外陣に分かれる。内陣の宮殿には60年に一度のみ開帳される10世紀頃の秘仏5体が安置されており、板戸に描かれた鶴の絵は日本最古とされる。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/index.html'
    },
    {
      file: '鶴林寺太子堂.mp4', thumb: 'thumb_鶴林寺太子堂.jpg',
      name: '鶴林寺太子堂',
      group: '国宝　建造物', groupLevel: '国指定文化財',
      badge: '国宝', badgeClass: 'badge-kokuhо',
      dotColor: '#c8a429',
      sub: '国指定文化財｜建造物',
      desc: '釈迦如来・文殊菩薩・普賢菩薩・四天王を本尊とする兵庫県最古の建築。聖徳太子ゆかりの聖霊院を前身とする天台宗の法華堂で、桧皮葺きの屋根と小組格天井が特徴。昭和51年（1976）の赤外線調査により、九品来迎図・涅槃図・飛天図など創建当時の壁画が発見されたが、今もすすに覆われ肉眼では確認できない。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/index.html'
    },
    // ── 重要文化財　建造物 ──────────────────────
    {
      file: '鶴林寺鐘楼.mp4', thumb: 'thumb_鶴林寺鐘楼.jpg',
      name: '鶴林寺鐘楼',
      group: '重要文化財　建造物', groupLevel: '国指定文化財',
      badge: '重要文化財', badgeClass: 'badge-jubun',
      dotColor: '#c0390b',
      sub: '国指定文化財｜建造物',
      desc: '2階に上って鐘をつく「袴腰造り」と呼ばれる珍しい構造をもつ大型鐘楼。国宝本堂と一連に建立され、均整のとれた美しさで知られる。重要文化財の梵鐘は約1000年前の高麗時代に造られた朝鮮鐘で、「黄鐘調」の澄んだ音色をもつ名鐘として伝わる。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/index.html'
    },
    // ── 史跡 ────────────────────────────────
    {
      file: '尼塚古墳.mp4', thumb: 'thumb_尼塚古墳.jpg',
      name: '尼塚古墳',
      group: '史跡', groupLevel: '国指定文化財',
      badge: '国指定史跡', badgeClass: 'badge-shiseki',
      dotColor: '#2d7a4f',
      sub: '国指定文化財｜史跡',
      desc: '5世紀中葉頃に築造された墳長51mの造り出し付き円墳（帆立貝式古墳）で、国史跡「西条古墳群」を構成する3基のひとつ。平成18年（2006）の発掘調査で人塚古墳と類似した構造をもつことが判明し、墳丘からは円筒埴輪列が出土しています。行者塚・人塚・尼塚と続く古墳群全体に共通するのは規模と構造が段階的に縮小していく変遷で、5世紀の東播磨における首長権の移り変わりを読み解く重要な手がかりとなっています。西条廃寺跡と隣接し、現在は史跡公園として整備・公開されています。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/index.html'
    },
    // ── 市指定文化財　建造物 ──────────────────────
    {
      file: '平木橋.mp4', thumb: 'thumb_平木橋.jpg',
      name: '平木橋',
      group: '建造物', groupLevel: '市指定文化財',
      badge: '市指定文化財', badgeClass: 'badge-shitei',
      dotColor: '#1a5a9a',
      sub: '市指定文化財｜建造物',
      desc: '野口町水足の前ノ池に移築保存されている水路橋。花崗岩のアーチと煉瓦の橋壁を組み合わせた構造が特徴で、大正4年（1915）に山田川疏水事業の一環として建造されました。いなみ野台地の農業用水を支えた近代土木遺産として高く評価され、道路建設に伴い平成21年（2009）に現在地へ移築後、市指定文化財に指定されています。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/sisiteikaisetu/sisiteihirakibasi.html'
    },
    // ── 市指定文化財　考古資料 ────────────────────
    {
      file: '稚児窟石棺蓋.mp4', thumb: 'thumb_稚児窟石棺蓋.jpg',
      name: '稚児窟石棺蓋',
      group: '考古資料', groupLevel: '市指定文化財',
      badge: '市指定文化財', badgeClass: 'badge-shitei',
      dotColor: '#1a5a9a',
      sub: '市指定文化財｜考古資料',
      desc: '池尻16号墳（稚児窟）に納められていた家形石棺の蓋。地元産の竜山石（流紋岩質溶結凝灰岩）製で、最大長242cmは市内最大級。縄掛突起を6個もち、表面は高度な技術で丁寧に仕上げられています。6世紀末〜7世紀初頭（古墳時代後期〜飛鳥時代初め）の製作とみられ、播磨の古代史とヤマト政権との関係を考えるうえで学術的価値の高い市指定文化財です。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/sisiteikaisetu/38602.html'
    },
    // ── 市登録文化財　歴史資料 ────────────────────
    {
      file: 'sitikitsuka-no-hi.mp4', thumb: 'thumb_七騎塚の碑.jpg',
      name: '七騎塚の碑',
      group: '歴史資料', groupLevel: '市登録文化財',
      badge: '市登録文化財', badgeClass: 'badge-touroku',
      dotColor: '#777',
      sub: '市登録文化財｜歴史資料',
      desc: '南北朝時代初頭（暦応4年・1341年）、主君・塩冶高貞を追手から逃がすべく加古川のほとりで討死した7騎の武者を顕彰する石碑。弟・重貞をはじめ木村・淵名・眞島・山中・平田ら6名が命を投じ、その忠節を哀れんだ地元の人々が各々の塚を築いて「七騎塚」と呼んだが、洪水と近代の河川改修により現在は全て失われている。石碑は文化10年（1813年）に西国街道（山陽道）沿いに建立。表文は幕府儒学者・古賀精里、碑陰文と書は頼山陽の父・頼春水が担う。その後、河川改修工事に伴い現在の大師堂境内に移設。江戸時代の地誌や名所案内にも「七騎塚」として記され、優れた文章と書で加古川の歴史を伝える文化史的価値をもつ歴史資料。',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/sitourokukaisetu_1/50021.html'
    },
  ];

  const grid            = document.getElementById('thumb-grid');
  const playerSection   = document.getElementById('player-section');
  const mainVideo       = document.getElementById('main-video');
  const nowPlayingTitle = document.getElementById('now-playing-title');
  const tocNav          = document.getElementById('toc-nav');
  const tocHint         = document.getElementById('toc-scroll-hint');

  // ===== 目次：マウスドラッグでスクロール（PC対応）=====
  let isDragging = false, dragStartX = 0, dragScrollLeft = 0;
  tocNav.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.pageX - tocNav.offsetLeft;
    dragScrollLeft = tocNav.scrollLeft;
    tocNav.classList.add('dragging');
  });
  document.addEventListener('mouseup', () => {
    isDragging = false;
    tocNav.classList.remove('dragging');
  });
  tocNav.addEventListener('mousemove', e => {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.pageX - tocNav.offsetLeft;
    tocNav.scrollLeft = dragScrollLeft - (x - dragStartX);
  });
  // スクロール末尾に達したらヒントを隠す
  tocNav.addEventListener('scroll', () => {
    const atEnd = tocNav.scrollLeft + tocNav.clientWidth >= tocNav.scrollWidth - 4;
    tocHint.style.opacity = atEnd ? '0' : '1';
  });

  let currentIndex = -1;

  // ===== 目次を生成（グループ区切り付き）=====
  let tocPrevGroup = null;
  videos.forEach((v, i) => {
    // グループが変わったら区切りラベルを挿入
    if (v.group !== tocPrevGroup) {
      const sep = document.createElement('span');
      sep.className = 'toc-item';
      sep.style.cssText = 'background:transparent;border-color:#333;color:#555;cursor:default;padding:5px 10px;font-size:0.68rem;letter-spacing:0.08em;';
      sep.textContent = `${v.groupLevel}｜${v.group}`;
      tocNav.appendChild(sep);
      tocPrevGroup = v.group;
    }

    const btn = document.createElement('button');
    btn.className = 'toc-item';
    // バッジ色ドット + 名前
    btn.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${v.dotColor};margin-right:5px;vertical-align:middle;position:relative;top:-1px;"></span>${v.name}`;
    btn.title = `${v.badge}｜${v.name}`;
    btn.addEventListener('click', () => {
      const target = document.getElementById(`card-${i}`);
      if (target) {
        const offset = 110;
        const top = target.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: 'smooth' });
        target.style.outline = `2px solid ${v.dotColor}`;
        setTimeout(() => { target.style.outline = ''; }, 1200);
      }
    });
    tocNav.appendChild(btn);
  });

  // ===== サムネイルカードを生成（グループヘッダー付き）=====
  let prevGroup = null;
  videos.forEach((v, i) => {
    // グループが変わったらヘッダーを挿入
    if (v.group !== prevGroup) {
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <div class="group-level">${v.groupLevel}</div>
        <div class="group-title">
          <span class="group-dot" style="background:${v.dotColor};"></span>${v.group}
        </div>`;
      grid.appendChild(header);
      prevGroup = v.group;
    }

    // カード本体
    const card = document.createElement('div');
    card.className = 'thumb-card';
    card.dataset.index = i;
    card.id = `card-${i}`;

    const wrapper = document.createElement('div');
    wrapper.className = 'thumb-wrapper';

    // サムネイル画像
    const img = document.createElement('img');
    img.className = 'thumb-canvas';
    img.src = v.thumb || '';
    img.alt = v.name;
    wrapper.appendChild(img);

    // 文化財指定バッジ（左上）
    const desigBadge = document.createElement('span');
    desigBadge.className = `desig-badge ${v.badgeClass}`;
    desigBadge.textContent = v.badge;
    wrapper.appendChild(desigBadge);

    // 再生オーバーレイ
    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    overlay.innerHTML = `<div class="play-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>`;
    wrapper.appendChild(overlay);

    // PLAYING バッジ（右上）
    const liveBadge = document.createElement('span');
    liveBadge.className = 'live-badge';
    liveBadge.textContent = 'PLAYING';
    wrapper.appendChild(liveBadge);

    card.appendChild(wrapper);

    // テキスト情報
    const info = document.createElement('div');
    info.className = 'thumb-info';
    info.innerHTML = `
      <div class="thumb-title">${v.name}</div>
      <div class="thumb-sub">${v.sub}</div>
      <div class="thumb-desc">${v.desc}</div>
      <span class="thumb-ref">出典：<a href="${v.ref}" target="_blank" rel="noopener">加古川市文化財調査研究センター</a></span>`;
    card.appendChild(info);

    card.addEventListener('click', () => playVideo(i));
    grid.appendChild(card);
  });

  // ===== 黒フレームかどうかを判定 =====
  function isBlackFrame(canvas) {
    try {
      const ctx = canvas.getContext('2d');
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let total = 0;
      // 100ピクセルをサンプリングして平均輝度を計算
      const step = Math.floor(data.length / 400);
      let count = 0;
      for (let i = 0; i < data.length; i += step * 4) {
        total += data[i] + data[i + 1] + data[i + 2];
        count++;
      }
      const avg = total / (count * 3);
      return avg < 10; // 平均輝度が10未満なら黒と判定
    } catch (e) {
      return false;
    }
  }

  // ===== 動画からフレームをキャプチャしてcanvasに描画 =====
  function captureThumb(file, canvas, loadDiv) {
    const tmpVideo = document.createElement('video');
    tmpVideo.src = file;
    tmpVideo.muted = true;
    tmpVideo.playsInline = true;
    tmpVideo.preload = 'metadata';
    tmpVideo.crossOrigin = 'anonymous';

    // 試みるシーク位置（duration の割合）
    const seekPoints = [0.1, 0.2, 0.35, 0.5, 0.65];
    let attemptIndex = 0;

    function drawFrame() {
      const w = 480, h = 270;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(tmpVideo, 0, 0, w, h);

      if (isBlackFrame(canvas) && attemptIndex < seekPoints.length - 1) {
        // 黒フレームなら次の位置を試みる
        attemptIndex++;
        tmpVideo.currentTime = tmpVideo.duration * seekPoints[attemptIndex];
        return; // seeked イベントで再試行
      }

      // 黒でない、または試行回数上限 → 表示確定
      loadDiv.style.display = 'none';
      canvas.style.display = 'block';
      tmpVideo.src = ''; // メモリ解放
    }

    tmpVideo.addEventListener('loadedmetadata', () => {
      tmpVideo.currentTime = tmpVideo.duration * seekPoints[0];
    });

    tmpVideo.addEventListener('seeked', drawFrame);

    tmpVideo.addEventListener('error', () => {
      // エラー時は代替表示
      loadDiv.innerHTML = '<span style="color:#555;font-size:0.75rem;">preview<br>unavailable</span>';
    });
  }

  // ===== 動画を再生 =====
  function playVideo(index) {
    if (index === currentIndex) return;

    // 以前のカードのハイライトを解除
    if (currentIndex !== -1) {
      const prev = grid.querySelector(`.thumb-card[data-index="${currentIndex}"]`);
      if (prev) prev.classList.remove('playing');
    }

    currentIndex = index;
    const v = videos[index];

    // プレイヤーを表示
    playerSection.classList.add('active');
    mainVideo.src = v.file;
    mainVideo.loop = true;
    mainVideo.play();
    nowPlayingTitle.textContent = `${v.name}（${v.badge}）`;

    // 再生中カードをハイライト
    const card = grid.querySelector(`.thumb-card[data-index="${index}"]`);
    if (card) {
      card.classList.add('playing');
      // スムーズにプレイヤーへスクロール
      playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
</script>
