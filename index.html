<!DOCTYPE html>
<html lang="ja" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加古川市の文化遺産・動画ギャラリー</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e0e0e;
      color: #f0f0f0;
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid #222;
      background: #111;
      position: relative;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    header .credit {
      margin-top: 6px;
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.03em;
    }

    #lang-toggle {
      position: absolute;
      top: 20px;
      right: 24px;
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    #lang-toggle:hover {
      background: #222;
      color: #fff;
      border-color: #666;
    }

    /* ======= 目次ナビゲーション 2段レイアウト ======= */
    #toc-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
    }

    #toc-nav {
      padding: 8px 48px 8px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      white-space: nowrap;
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    #toc-nav.dragging { cursor: grabbing; }
    #toc-nav::-webkit-scrollbar { display: none; }

    #toc-scroll-hint {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 48px;
      background: linear-gradient(to right, transparent, #161616);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-size: 0.8rem;
      color: #555;
    }

    .toc-label {
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.1em;
      padding: 0 12px 0 2px;
      white-space: nowrap;
      align-self: center;
      flex-shrink: 0;
    }

    .toc-col {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 10px;
      border-right: 1px solid #282828;
      flex-shrink: 0;
    }
    .toc-col:first-child { padding-left: 0; }
    .toc-col:last-child  { border-right: none; }

    .toc-group-label {
      font-size: 0.64rem;
      color: #666;
      letter-spacing: 0.06em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 0;
    }

    .toc-btn {
      display: block;
      padding: 4px 12px;
      background: #222;
      border: 1px solid #333;
      border-radius: 14px;
      font-size: 0.75rem;
      color: #ccc;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      user-select: none;
    }
    .toc-btn:hover  { background: #2e2e2e; color: #fff; border-color: #555; }
    .toc-btn:active { color: #000; }

    @media (max-width: 600px) {
      #toc-nav { padding: 6px 40px 6px 10px; }
      .toc-col { padding: 0 8px; gap: 3px; }
      .toc-group-label { font-size: 0.60rem; }
      .toc-btn { font-size: 0.70rem; padding: 3px 10px; }
    }

    /* ======= Player Area ======= */
    #player-section {
      display: none;
      background: #000;
      position: relative;
    }

    #player-section.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #main-video {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      background: #000;
    }

    #now-playing-label {
      width: 100%;
      padding: 10px 20px;
      background: rgba(0,0,0,0.85);
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    #now-playing-label span {
      color: #fff;
      font-weight: 600;
    }

    #now-playing-label #now-playing-prefix {
      color: #aaa;
      font-weight: 400;
    }

    /* ======= Thumbnail Grid ======= */
    #gallery {
      padding: 28px 28px 40px;
    }

    #gallery h2 {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .thumb-card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
    }

    .thumb-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      border-color: #444;
    }

    .thumb-card.playing {
      border-color: #e53935;
      box-shadow: 0 0 0 2px #e53935aa;
    }

    .thumb-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
    }

    .thumb-canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      transition: background 0.2s;
    }

    .thumb-card:hover .play-overlay {
      background: rgba(0,0,0,0.15);
    }

    .thumb-card.playing .play-overlay {
      background: rgba(229,57,53,0.18);
    }

    .play-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }

    .thumb-card:hover .play-icon {
      background: rgba(229,57,53,0.85);
      transform: scale(1.08);
    }

    .thumb-card.playing .play-icon {
      background: rgba(229,57,53,0.9);
    }

    .play-icon svg {
      margin-left: 4px;
    }

    .live-badge {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: #e53935;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .thumb-card.playing .live-badge {
      display: block;
    }

    /* ===== 文化財指定バッジ ===== */
    .desig-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 3px;
      z-index: 2;
      pointer-events: none;
      line-height: 1.3;
    }

    .badge-kokuhо   { background: #c8a429; color: #1a1a1a; }
    .badge-jubun    { background: #c0390b; color: #fff;    }
    .badge-shiseki  { background: #2d7a4f; color: #fff;    }
    .badge-shitei   { background: #1a5a9a; color: #fff;    }
    .badge-touroku  { background: #555;    color: #ddd;    }

    /* ===== グループヘッダー ===== */
    .group-header {
      grid-column: 1 / -1;
      margin: 28px 0 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2e2e2e;
    }

    .group-header:first-child {
      margin-top: 0;
    }

    .group-header .group-level {
      font-size: 0.68rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .group-header .group-title {
      font-size: 1rem;
      font-weight: 600;
      color: #ddd;
      letter-spacing: 0.04em;
    }

    .group-header .group-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 7px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .thumb-info {
      padding: 12px 14px;
    }

    .thumb-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.4;
      word-break: break-all;
    }

    .thumb-sub {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }

    .thumb-desc {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 8px;
      line-height: 1.6;
      border-top: 1px solid #2a2a2a;
      padding-top: 8px;
    }

    .thumb-ref {
      display: block;
      margin-top: 8px;
      font-size: 0.72rem;
      color: #555;
    }

    .thumb-ref a {
      color: #6a9fd8;
      text-decoration: none;
    }

    .thumb-ref a:hover {
      text-decoration: underline;
    }

    .thumb-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ======= Responsive ======= */
    @media (max-width: 600px) {
      header {
        padding: 16px 16px 12px;
        padding-right: 84px;
      }
      header h1 {
        font-size: 1.05rem;
      }
      header .credit {
        font-size: 0.7rem;
      }
      #lang-toggle {
        top: 14px;
        right: 12px;
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      #gallery {
        padding: 16px 12px 28px;
      }
      #map-section {
        padding: 16px 12px 28px;
      }
      .thumb-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .thumb-desc {
        font-size: 0.78rem;
      }
      #map {
        height: 300px;
      }
      #now-playing-label {
        font-size: 0.78rem;
        padding: 8px 12px;
      }
    }

    @media (min-width: 601px) and (max-width: 900px) {
      header {
        padding: 18px 20px 14px;
      }
      #gallery {
        padding: 20px 16px 32px;
      }
      #map-section {
        padding: 20px 16px 32px;
      }
      .thumb-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      #map {
        height: 360px;
      }
    }

    /* ======= Map Section ======= */
    #map-section {
      padding: 28px 28px 40px;
      border-top: 1px solid #1e1e1e;
    }

    #map-section h2 {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    #map {
      width: 100%;
      height: 420px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>

<header>
  <h1 id="page-title">🎬 加古川市の文化遺産・動画ギャラリー</h1>
  <p class="credit" id="page-credit">制作：兵庫県立東播工業高等学校 建築科 ファブラボスタジオ（FabLab Studio）</p>
  <button id="lang-toggle" aria-label="Switch language">EN</button>
</header>

<div id="toc-wrap">
  <nav id="toc-nav">
    <!-- generated by JS -->
  </nav>
  <div id="toc-scroll-hint">›</div>
</div>

<section id="player-section">
  <video id="main-video" autoplay loop playsinline></video>
  <div id="now-playing-label"><span id="now-playing-prefix">再生中：</span><span id="now-playing-title">—</span></div>
</section>

<div id="gallery">
  <h2 id="gallery-h2">動画一覧</h2>
  <div class="thumb-grid" id="thumb-grid"></div>
</div>

<div id="map-section">
  <h2 id="map-h2">📍 所在地マップ（加古川市）</h2>
  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // ===== 地図の初期化 =====
  const map = L.map('map').setView([34.775, 134.860], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  const spots = [
    {
      lat: 34.76477, lon: 134.86173,
      label: '🌉 平木橋／市指定文化財', labelEn: '🌉 Hiraki Bridge / City Cultural Property',
      sub: '加古川市野口町水足247', subEn: 'Noguchi-cho Mizutari, Kakogawa City',
      note: '大正4年（1915）建造の水路橋。市指定文化財。',
      noteEn: 'Masonry aqueduct bridge built 1915 (Taisho 4). City-designated cultural property.'
    },
    {
      lat: 34.79148, lon: 134.85160,
      label: '🪨 稚児窟石棺蓋／市指定文化財', labelEn: '🪨 Chigoiwaya Stone Coffin Lid / City Cultural Property',
      sub: '加古川市平荘町69', subEn: 'Heiso-cho 69, Kakogawa City',
      note: '6世紀末〜7世紀初頭の家形石棺蓋。市指定文化財。',
      noteEn: 'House-shaped stone coffin lid, late 6th–early 7th century. City-designated cultural property.'
    },
    {
      lat: 34.78159, lon: 134.88669,
      label: '🏛 尼塚古墳／国指定史跡', labelEn: '🏛 Amatsuka Burial Mound / National Historic Site',
      sub: '加古川市西条古墳群', subEn: 'Saijo Kofun Cluster, Kakogawa City',
      note: '5世紀中葉頃築造の帆立貝式古墳。国指定史跡・西条古墳群のひとつ。',
      noteEn: 'Scallop-shell style kofun, mid-5th century. Part of the nationally designated Saijo Kofun Historic Site.'
    },
    {
      lat: 34.75228, lon: 134.83261,
      label: '⛩ 鶴林寺本堂／国宝', labelEn: '⛩ Kakurinji Temple Main Hall / National Treasure',
      sub: '加古川市加古川町北在家424', subEn: 'Kitaizai 424, Kakogawa-cho, Kakogawa City',
      note: '14世紀建立の折衷様式建築。国宝。',
      noteEn: '14th-century eclectic-style Buddhist architecture. National Treasure.'
    },
    {
      lat: 34.75213, lon: 134.83283,
      label: '⛩ 鶴林寺太子堂／国宝', labelEn: '⛩ Kakurinji Temple Taishi-do Hall / National Treasure',
      sub: '加古川市加古川町北在家424', subEn: 'Kitaizai 424, Kakogawa-cho, Kakogawa City',
      note: '兵庫県最古の建築。天台宗の法華堂。国宝。',
      noteEn: 'Oldest surviving building in Hyogo Prefecture. Tendai Buddhist Hokke-do hall. National Treasure.'
    },
    {
      lat: 34.75231, lon: 134.83292,
      label: '🔔 鶴林寺鐘楼／国指定重要文化財', labelEn: '🔔 Kakurinji Temple Bell Tower / Important Cultural Property',
      sub: '加古川市加古川町北在家424', subEn: 'Kitaizai 424, Kakogawa-cho, Kakogawa City',
      note: '袴腰造りの大型鐘楼。高麗時代の朝鮮鐘を所蔵。重要文化財。',
      noteEn: 'Large bell tower (hakamakoshi style). Houses a Goryeo-dynasty Korean bell. Important Cultural Property.'
    },
    {
      lat: 34.77470, lon: 134.82831,
      label: '📜 七騎塚の碑／市登録文化財', labelEn: '📜 Shichikizuka Monument / City-Registered Cultural Property',
      sub: '加古川市加古川町本町（大師堂境内）', subEn: 'Daishi-do Temple Precinct, Honmachi, Kakogawa City',
      note: '南北朝時代（1341年）に主君のため討死した7騎を顕彰。文化10年（1813年）建立。市登録文化財。',
      noteEn: 'Erected 1813 to honor 7 warriors who died for their lord in 1341. City-registered cultural property.'
    }
  ];

  const mapBounds = spots.map(s => [s.lat, s.lon]);
  const mapMarkers = [];

  spots.forEach((spot, i) => {
    const marker = L.marker([spot.lat, spot.lon]).addTo(map);
    marker.bindPopup('');
    mapMarkers.push({ marker, spot });
    if (i === 0) marker.openPopup();
  });

  map.fitBounds(mapBounds, { padding: [60, 60] });

  function updateMapPopups() {
    mapMarkers.forEach(({ marker, spot }) => {
      const label = currentLang === 'en' ? (spot.labelEn || spot.label) : spot.label;
      const sub   = currentLang === 'en' ? (spot.subEn   || spot.sub)   : spot.sub;
      const note  = currentLang === 'en' ? (spot.noteEn  || spot.note)  : spot.note;
      marker.setPopupContent(`
        <div style="font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;min-width:190px;">
          <strong style="font-size:1rem;">${label}</strong><br>
          <span style="font-size:0.8rem;color:#666;">${sub}</span><br>
          <span style="font-size:0.78rem;margin-top:4px;display:block;">${note}</span>
        </div>
      `);
    });
  }

  // ===== 動画ファイルリスト =====
  const videos = [
    // ── 国宝　建造物 ──────────────────────────
    {
      file: '鶴林寺本堂.mp4', thumb: 'thumb_鶴林寺本堂.jpg',
      name: '鶴林寺本堂',         nameEn: 'Kakurinji Temple Main Hall',
      group: '国宝　建造物',       groupEn: 'National Treasure — Architecture',
      groupLevel: '国指定文化財',  groupLevelEn: 'Nationally Designated Cultural Property',
      badge: '国宝',               badgeEn: 'National Treasure',
      badgeClass: 'badge-kokuhо',  dotColor: '#c8a429',
      sub: '国指定文化財｜建造物', subEn: 'National Treasure | Architecture',
      desc: '薬師如来・日光菩薩・月光菩薩を本尊とし、説法や儀式の場として「大講堂」とも称される。和様に唐様・天竺様を融合した折衷様式（14世紀）の最高峰とされる建築で、内部は内陣と外陣に分かれる。内陣の宮殿には60年に一度のみ開帳される10世紀頃の秘仏5体が安置されており、板戸に描かれた鶴の絵は日本最古とされる。',
      descEn: 'Also known as the "Great Lecture Hall," this hall enshrines Yakushi Nyorai (Medicine Buddha) as its principal image. A 14th-century masterpiece blending Japanese (Wayō), Chinese (Karayō), and Indian (Tenjikuyō) architectural styles, its interior is divided into inner and outer sanctuaries. The inner sanctuary houses five secret statues from the 10th century, opened only once every 60 years. The crane paintings on its wooden door panels are the oldest known in Japan.',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/kunisiteikaisetu/kokuhoukakurinjihondou.html'
    },
    {
      file: '鶴林寺太子堂.mp4', thumb: 'thumb_鶴林寺太子堂.jpg',
      name: '鶴林寺太子堂',        nameEn: 'Kakurinji Temple Taishi-do Hall',
      group: '国宝　建造物',        groupEn: 'National Treasure — Architecture',
      groupLevel: '国指定文化財',   groupLevelEn: 'Nationally Designated Cultural Property',
      badge: '国宝',                badgeEn: 'National Treasure',
      badgeClass: 'badge-kokuhо',   dotColor: '#c8a429',
      sub: '国指定文化財｜建造物',  subEn: 'National Treasure | Architecture',
      desc: '釈迦如来・文殊菩薩・普賢菩薩・四天王を本尊とする兵庫県最古の建築。聖徳太子ゆかりの聖霊院を前身とする天台宗の法華堂で、桧皮葺きの屋根と小組格天井が特徴。昭和51年（1976）の赤外線調査により、九品来迎図・涅槃図・飛天図など創建当時の壁画が発見されたが、今もすすに覆われ肉眼では確認できない。',
      descEn: "The oldest surviving building in Hyogo Prefecture, enshrining Shakyamuni Buddha and attendants. Originally dedicated to Prince Shotoku, this Tendai Buddhist Hokke-do features a cypress-bark roof and a coffered ceiling. Infrared photography in 1976 revealed original wall paintings — including a Kuhon Raiko-zu, a Parinirvana scene, and celestial beings — but they remain hidden to the naked eye beneath centuries of soot.",
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/kunisiteikaisetu/kokuhoukakurinjitaisidou.html'
    },
    // ── 重要文化財　建造物 ──────────────────────
    {
      file: '鶴林寺鐘楼.mp4', thumb: 'thumb_鶴林寺鐘楼.jpg',
      name: '鶴林寺鐘楼',            nameEn: 'Kakurinji Temple Bell Tower',
      group: '重要文化財　建造物',    groupEn: 'Important Cultural Property — Architecture',
      groupLevel: '国指定文化財',     groupLevelEn: 'Nationally Designated Cultural Property',
      badge: '重要文化財',            badgeEn: 'Imp. Cultural Prop.',
      badgeClass: 'badge-jubun',      dotColor: '#c0390b',
      sub: '国指定文化財｜建造物',    subEn: 'Important Cultural Property | Architecture',
      desc: '2階に上って鐘をつく「袴腰造り」と呼ばれる珍しい構造をもつ大型鐘楼。国宝本堂と一連に建立され、均整のとれた美しさで知られる。重要文化財の梵鐘は約1000年前の高麗時代に造られた朝鮮鐘で、「黄鐘調」の澄んだ音色をもつ名鐘として伝わる。',
      descEn: 'A large bell tower featuring the rare "hakamakoshi" construction, where one climbs to the second floor to ring the bell. Built alongside the National Treasure Main Hall, it is admired for its elegant proportions. Its Important Cultural Property temple bell was cast in Korea during the Goryeo dynasty (~1,000 years ago) and is renowned for its clear, resonant tone.',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/kunisiteikaisetu/kunisiteikakurinjishourou.html'
    },
    // ── 史跡 ────────────────────────────────
    {
      file: '尼塚古墳.mp4', thumb: 'thumb_尼塚古墳.jpg',
      name: '尼塚古墳',              nameEn: 'Amatsuka Burial Mound',
      group: '史跡',                 groupEn: 'Historic Site',
      groupLevel: '国指定文化財',    groupLevelEn: 'Nationally Designated Cultural Property',
      badge: '国指定史跡',           badgeEn: "Nat'l Historic Site",
      badgeClass: 'badge-shiseki',   dotColor: '#2d7a4f',
      sub: '国指定文化財｜史跡',     subEn: 'National Historic Site | Burial Mound',
      desc: '5世紀中葉頃に築造された墳長51mの造り出し付き円墳（帆立貝式古墳）で、国史跡「西条古墳群」を構成する3基のひとつ。平成18年（2006）の発掘調査で人塚古墳と類似した構造をもつことが判明し、墳丘からは円筒埴輪列が出土しています。行者塚・人塚・尼塚と続く古墳群全体に共通するのは規模と構造が段階的に縮小していく変遷で、5世紀の東播磨における首長権の移り変わりを読み解く重要な手がかりとなっています。西条廃寺跡と隣接し、現在は史跡公園として整備・公開されています。',
      descEn: 'A scallop-shell style burial mound (51 m total length) built around the mid-5th century, and one of three mounds forming the nationally designated Saijo Kofun Historic Site. Excavations in 2006 revealed structural similarities to the nearby Hitozuka mound, and a row of cylindrical haniwa figures was unearthed. The cluster illustrates a progressive reduction in scale across generations — key evidence for the shifting of chieftain power in eastern Harima during the 5th century. Now maintained as a historic park adjacent to the Saijo-ji Temple ruins.',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/kunisiteikaisetu/kunisiteisaijoukofungun.html',
      refLabel: '加古川市文化財調査研究センター（西条古墳群）',
      refLabelEn: 'Kakogawa City Cultural Properties Research Center (Saijo Kofun Cluster)'
    },
    // ── 市指定文化財　建造物 ──────────────────────
    {
      file: '平木橋.mp4', thumb: 'thumb_平木橋.jpg',
      name: '平木橋',                nameEn: 'Hiraki Bridge',
      group: '建造物',               groupEn: 'Architecture',
      groupLevel: '市指定文化財',    groupLevelEn: 'City-Designated Cultural Property',
      badge: '市指定文化財',         badgeEn: 'City Designated',
      badgeClass: 'badge-shitei',    dotColor: '#1a5a9a',
      sub: '市指定文化財｜建造物',   subEn: 'City-Designated Cultural Property | Architecture',
      desc: '野口町水足の前ノ池に移築保存されている水路橋。花崗岩のアーチと煉瓦の橋壁を組み合わせた構造が特徴で、大正4年（1915）に山田川疏水事業の一環として建造されました。いなみ野台地の農業用水を支えた近代土木遺産として高く評価され、道路建設に伴い平成21年（2009）に現在地へ移築後、市指定文化財に指定されています。',
      descEn: 'A masonry aqueduct bridge now preserved at Maenoike Pond, Noguchi-cho. Notable for its combination of granite arches and brick side walls, it was built in 1915 as part of the Yamada River irrigation project. Highly regarded as a modern civil-engineering heritage that supplied agricultural water to the Inami plateau, it was relocated to its current site in 2009 and subsequently designated as a city-level cultural property.',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/sisiteikaisetu/sisiteihirakibasi.html'
    },
    // ── 市指定文化財　考古資料 ────────────────────
    {
      file: '稚児窟石棺蓋.mp4', thumb: 'thumb_稚児窟石棺蓋.jpg',
      name: '稚児窟石棺蓋',           nameEn: 'Chigoiwaya Stone Coffin Lid',
      group: '考古資料',              groupEn: 'Archaeological Material',
      groupLevel: '市指定文化財',     groupLevelEn: 'City-Designated Cultural Property',
      badge: '市指定文化財',          badgeEn: 'City Designated',
      badgeClass: 'badge-shitei',     dotColor: '#1a5a9a',
      sub: '市指定文化財｜考古資料',  subEn: 'City-Designated Cultural Property | Archaeology',
      desc: '池尻16号墳（稚児窟）に納められていた家形石棺の蓋。地元産の竜山石（流紋岩質溶結凝灰岩）製で、最大長242cmは市内最大級。縄掛突起を6個もち、表面は高度な技術で丁寧に仕上げられています。6世紀末〜7世紀初頭（古墳時代後期〜飛鳥時代初め）の製作とみられ、播磨の古代史とヤマト政権との関係を考えるうえで学術的価値の高い市指定文化財です。',
      descEn: 'The lid of a house-shaped stone coffin from Ikegiri Burial Mound No. 16 (Chigoiwaya). Made from locally quarried Tatsuyama stone (rhyolitic welded tuff), it measures 242 cm — the largest in the city. It has six rope-hanging projections (nawakake-tokki) and a carefully finished surface. Dating to the late 6th–early 7th century, it is of high scholarly value for understanding ancient Harima and its ties to the Yamato court.',
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/sisiteikaisetu/38602.html'
    },
    // ── 市登録文化財　歴史資料 ────────────────────
    {
      file: 'sitikitsuka-no-hi.mp4', thumb: 'thumb_七騎塚の碑.jpg',
      name: '七騎塚の碑',              nameEn: 'Shichikizuka Monument',
      group: '歴史資料',               groupEn: 'Historical Record',
      groupLevel: '市登録文化財',      groupLevelEn: 'City-Registered Cultural Property',
      badge: '市登録文化財',           badgeEn: 'City Registered',
      badgeClass: 'badge-touroku',     dotColor: '#777',
      sub: '市登録文化財｜歴史資料',   subEn: 'City-Registered Cultural Property | Historical Record',
      desc: '南北朝時代初頭（暦応4年・1341年）、主君・塩冶高貞を追手から逃がすべく加古川のほとりで討死した7騎の武者を顕彰する石碑。弟・重貞をはじめ木村・淵名・眞島・山中・平田ら6名が命を投じ、その忠節を哀れんだ地元の人々が各々の塚を築いて「七騎塚」と呼んだが、洪水と近代の河川改修により現在は全て失われている。石碑は文化10年（1813年）に西国街道（山陽道）沿いに建立。表文は幕府儒学者・古賀精里、碑陰文と書は頼山陽の父・頼春水が担う。その後、河川改修工事に伴い現在の大師堂境内に移設。江戸時代の地誌や名所案内にも「七騎塚」として記され、優れた文章と書で加古川の歴史を伝える文化史的価値をもつ歴史資料。',
      descEn: "A stone monument honoring seven warriors who died along the Kakogawa River in 1341, sacrificing themselves so their lord Enya Takasada could escape his pursuers. Though the seven grave mounds known as 'Shichikizuka' were lost to floods and river improvement works, this stele was erected in 1813 along the Saigoku Road. The main inscription was composed by Seiri Koga, a Confucian scholar of the Shogunate; the reverse text and calligraphy are by Shunsui Rai, father of the historian Sanyo Rai. Later moved to the Daishi-do temple precinct, the monument is valued as a cultural-historical record of Kakogawa's past.",
      ref: 'https://www.city.kakogawa.lg.jp/soshikikarasagasu/kyouiku/kakuka/kyoikushidobu/bunkazai_cyosa/bunkazai/sitourokukaisetu_1/50021.html'
    },
  ];

  const grid             = document.getElementById('thumb-grid');
  const playerSection    = document.getElementById('player-section');
  const mainVideo        = document.getElementById('main-video');
  const nowPlayingTitle  = document.getElementById('now-playing-title');
  const nowPlayingPrefix = document.getElementById('now-playing-prefix');
  const tocNav           = document.getElementById('toc-nav');
  const tocHint          = document.getElementById('toc-scroll-hint');

  // ===== 言語設定 =====
  let currentLang = 'ja';

  const ui = {
    ja: {
      title:      '🎬 加古川市の文化遺産・動画ギャラリー',
      credit:     '制作：兵庫県立東播工業高等学校 建築科 ファブラボスタジオ（FabLab Studio）',
      tocLabel:   '目次',
      galleryH2:  '動画一覧',
      mapH2:      '📍 所在地マップ（加古川市）',
      nowPlaying: '再生中：',
      refPrefix:  '出典：',
      refDefault: '加古川市文化財調査研究センター',
      langBtn:    'EN',
    },
    en: {
      title:      '🎬 Cultural Heritage Video Gallery — Kakogawa City',
      credit:     'Produced by: FabLab Studio, Architecture Dept., Hyogo Pref. Toban Technical High School',
      tocLabel:   'Contents',
      galleryH2:  'VIDEO LIBRARY',
      mapH2:      '📍 Location Map (Kakogawa City)',
      nowPlaying: 'Now Playing: ',
      refPrefix:  'Source: ',
      refDefault: 'Kakogawa City Cultural Properties Research Center',
      langBtn:    'JA',
    }
  };

  // ===== 目次：ドラッグスクロール（PC対応）=====
  let isDragging = false, dragStartX = 0, dragScrollLeft = 0;
  tocNav.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.pageX - tocNav.offsetLeft;
    dragScrollLeft = tocNav.scrollLeft;
    tocNav.classList.add('dragging');
  });
  document.addEventListener('mouseup', () => {
    isDragging = false;
    tocNav.classList.remove('dragging');
  });
  tocNav.addEventListener('mousemove', e => {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.pageX - tocNav.offsetLeft;
    tocNav.scrollLeft = dragScrollLeft - (x - dragStartX);
  });
  tocNav.addEventListener('scroll', () => {
    const atEnd = tocNav.scrollLeft + tocNav.clientWidth >= tocNav.scrollWidth - 4;
    tocHint.style.opacity = atEnd ? '0' : '1';
  });

  let currentIndex = -1;

  // ===== 全体再描画（言語切替時に呼ぶ）=====
  function renderAll() {
    const lang = currentLang;
    const u = ui[lang];

    // 静的テキスト
    document.getElementById('html-root').lang = lang;
    document.title = u.title.replace('🎬 ', '');
    document.getElementById('page-title').textContent = u.title;
    document.getElementById('page-credit').textContent = u.credit;
    document.getElementById('gallery-h2').textContent = u.galleryH2;
    document.getElementById('map-h2').textContent = u.mapH2;
    document.getElementById('lang-toggle').textContent = u.langBtn;
    nowPlayingPrefix.textContent = u.nowPlaying;

    // 目次を再生成
    tocNav.innerHTML = `<span class="toc-label">${u.tocLabel}</span>`;
    const tocCols = {};

    videos.forEach((v, i) => {
      const groupKey  = v.group;
      const dispGroup = lang === 'en' ? (v.groupEn      || v.group)      : v.group;
      const dispLevel = lang === 'en' ? (v.groupLevelEn || v.groupLevel) : v.groupLevel;
      const dispName  = lang === 'en' ? (v.nameEn       || v.name)       : v.name;

      if (!tocCols[groupKey]) {
        const col = document.createElement('div');
        col.className = 'toc-col';
        const label = document.createElement('div');
        label.className = 'toc-group-label';
        label.innerHTML = `
          <span style="width:8px;height:8px;border-radius:2px;background:${v.dotColor};display:inline-block;flex-shrink:0;"></span>
          <span>${dispLevel}<br>${dispGroup}</span>`;
        col.appendChild(label);
        tocCols[groupKey] = col;
        tocNav.appendChild(col);
      }

      const btn = document.createElement('button');
      btn.className = 'toc-btn';
      btn.style.borderColor = v.dotColor + '55';
      btn.textContent = dispName;
      btn.addEventListener('click', () => {
        const target = document.getElementById(`card-${i}`);
        if (target) {
          const top = target.getBoundingClientRect().top + window.scrollY - 120;
          window.scrollTo({ top, behavior: 'smooth' });
          target.style.outline = `2px solid ${v.dotColor}`;
          setTimeout(() => { target.style.outline = ''; }, 1200);
        }
      });
      tocCols[groupKey].appendChild(btn);
    });

    // カードグリッドを再生成
    grid.innerHTML = '';
    let prevGroup = null;

    videos.forEach((v, i) => {
      const dispGroup  = lang === 'en' ? (v.groupEn      || v.group)      : v.group;
      const dispLevel  = lang === 'en' ? (v.groupLevelEn || v.groupLevel) : v.groupLevel;
      const dispName   = lang === 'en' ? (v.nameEn       || v.name)       : v.name;
      const dispSub    = lang === 'en' ? (v.subEn        || v.sub)        : v.sub;
      const dispDesc   = lang === 'en' ? (v.descEn       || v.desc)       : v.desc;
      const dispBadge  = lang === 'en' ? (v.badgeEn      || v.badge)      : v.badge;
      const dispRef    = lang === 'en'
        ? (v.refLabelEn || u.refDefault)
        : (v.refLabel   || u.refDefault);

      if (v.group !== prevGroup) {
        const header = document.createElement('div');
        header.className = 'group-header';
        header.innerHTML = `
          <div class="group-level">${dispLevel}</div>
          <div class="group-title">
            <span class="group-dot" style="background:${v.dotColor};"></span>${dispGroup}
          </div>`;
        grid.appendChild(header);
        prevGroup = v.group;
      }

      const card = document.createElement('div');
      card.className = 'thumb-card';
      card.dataset.index = i;
      card.id = `card-${i}`;
      if (i === currentIndex) card.classList.add('playing');

      const wrapper = document.createElement('div');
      wrapper.className = 'thumb-wrapper';

      const img = document.createElement('img');
      img.className = 'thumb-canvas';
      img.src = v.thumb || '';
      img.alt = dispName;
      wrapper.appendChild(img);

      const desigBadge = document.createElement('span');
      desigBadge.className = `desig-badge ${v.badgeClass}`;
      desigBadge.textContent = dispBadge;
      wrapper.appendChild(desigBadge);

      const overlay = document.createElement('div');
      overlay.className = 'play-overlay';
      overlay.innerHTML = `<div class="play-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>`;
      wrapper.appendChild(overlay);

      const liveBadge = document.createElement('span');
      liveBadge.className = 'live-badge';
      liveBadge.textContent = 'PLAYING';
      wrapper.appendChild(liveBadge);

      card.appendChild(wrapper);

      const info = document.createElement('div');
      info.className = 'thumb-info';
      info.innerHTML = `
        <div class="thumb-title">${dispName}</div>
        <div class="thumb-sub">${dispSub}</div>
        <div class="thumb-desc">${dispDesc}</div>
        <span class="thumb-ref">${u.refPrefix}<a href="${v.ref}" target="_blank" rel="noopener">${dispRef}</a></span>`;
      card.appendChild(info);

      card.addEventListener('click', () => playVideo(i));
      grid.appendChild(card);
    });

    // 再生中タイトルを更新
    if (currentIndex !== -1) {
      const v = videos[currentIndex];
      const n = lang === 'en' ? (v.nameEn  || v.name)  : v.name;
      const b = lang === 'en' ? (v.badgeEn || v.badge) : v.badge;
      nowPlayingTitle.textContent = lang === 'en' ? `${n} (${b})` : `${n}（${b}）`;
    }

    updateMapPopups();
  }

  // ===== 言語トグル =====
  document.getElementById('lang-toggle').addEventListener('click', () => {
    currentLang = currentLang === 'ja' ? 'en' : 'ja';
    renderAll();
  });

  // ===== 動画を再生 =====
  function playVideo(index) {
    if (index === currentIndex) return;

    if (currentIndex !== -1) {
      const prev = grid.querySelector(`.thumb-card[data-index="${currentIndex}"]`);
      if (prev) prev.classList.remove('playing');
    }

    currentIndex = index;
    const v = videos[index];

    playerSection.classList.add('active');
    mainVideo.src = v.file;
    mainVideo.loop = true;
    mainVideo.play();

    const n = currentLang === 'en' ? (v.nameEn  || v.name)  : v.name;
    const b = currentLang === 'en' ? (v.badgeEn || v.badge) : v.badge;
    nowPlayingTitle.textContent = currentLang === 'en' ? `${n} (${b})` : `${n}（${b}）`;

    const card = grid.querySelector(`.thumb-card[data-index="${index}"]`);
    if (card) {
      card.classList.add('playing');
      playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  // ===== 初期描画 =====
  renderAll();
</script>

</body>
</html>
